<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:">
  <title>MegaBrain</title>
  <style>
    :root {
      --canvas: #f4f5f2;
      --surface: #ffffff;
      --surface-muted: #f8f9f7;
      --border: #d9ddd6;
      --border-strong: #b8c0b6;
      --text: #202620;
      --text-muted: #657064;
      --accent: #176a4a;
      --accent-soft: #e4f2eb;
      --blue: #285f87;
      --blue-soft: #e8f0f6;
      --warning: #8a5a12;
      --warning-soft: #f8edd8;
      --danger: #a13b37;
      --danger-soft: #fae9e7;
      --shadow: 0 1px 2px rgba(25, 35, 28, 0.06);
    }

    * {
      box-sizing: border-box;
      letter-spacing: 0;
    }

    html {
      background: var(--canvas);
      color: var(--text);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
    }

    body {
      margin: 0;
      min-width: 320px;
    }

    button,
    input,
    select {
      color: inherit;
      font: inherit;
    }

    button,
    select {
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    a:focus-visible {
      outline: 3px solid rgba(40, 95, 135, 0.28);
      outline-offset: 2px;
    }

    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      align-items: center;
      display: flex;
      gap: 18px;
      margin: 0 auto;
      max-width: 1440px;
      min-height: 64px;
      padding: 10px 28px;
    }

    .brand {
      align-items: center;
      display: flex;
      flex: 0 0 auto;
      gap: 10px;
      min-width: 180px;
    }

    .brand-mark {
      align-items: center;
      background: var(--text);
      border-radius: 6px;
      color: white;
      display: inline-flex;
      font-size: 15px;
      font-weight: 750;
      height: 34px;
      justify-content: center;
      width: 34px;
    }

    .brand-name {
      font-size: 17px;
      font-weight: 720;
      line-height: 1.2;
    }

    .brand-subtitle {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.2;
      margin-top: 2px;
    }

    .sync-state {
      align-items: center;
      color: var(--text-muted);
      display: flex;
      flex: 0 0 auto;
      font-size: 12px;
      gap: 7px;
      margin-left: auto;
      white-space: nowrap;
    }

    .sync-dot {
      background: var(--accent);
      border-radius: 50%;
      height: 8px;
      width: 8px;
    }

    .sync-state.stale {
      color: var(--warning);
    }

    .sync-state.stale .sync-dot {
      background: var(--warning);
    }

    .layout {
      display: grid;
      grid-template-columns: 224px minmax(0, 1fr);
      margin: 0 auto;
      max-width: 1440px;
      min-height: calc(100vh - 65px);
    }

    .sidebar {
      border-right: 1px solid var(--border);
      padding: 24px 18px;
    }

    .nav {
      display: grid;
      gap: 4px;
      position: sticky;
      top: 89px;
    }

    .nav-button {
      align-items: center;
      background: transparent;
      border: 0;
      border-radius: 6px;
      display: flex;
      font-weight: 620;
      justify-content: space-between;
      min-height: 40px;
      padding: 8px 10px;
      text-align: left;
      width: 100%;
    }

    .nav-button:hover {
      background: rgba(255, 255, 255, 0.7);
    }

    .nav-button.active {
      background: var(--surface);
      box-shadow: var(--shadow);
      color: var(--accent);
    }

    .nav-count {
      color: var(--text-muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      font-weight: 650;
    }

    .nav-button.active .nav-count {
      color: var(--accent);
    }

    main {
      min-width: 0;
      padding: 26px 32px 52px;
    }

    .page-heading {
      align-items: end;
      display: flex;
      gap: 18px;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .page-heading h1 {
      font-size: 25px;
      line-height: 1.2;
      margin: 0;
    }

    .page-meta {
      color: var(--text-muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .snapshot-note {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.55;
      margin: -10px 0 18px;
      max-width: 860px;
    }

    .toolbar {
      align-items: center;
      display: grid;
      gap: 8px;
      grid-template-columns: minmax(190px, 1fr) repeat(6, minmax(110px, auto));
      margin-bottom: 18px;
    }

    .control {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      height: 40px;
      min-width: 0;
      padding: 0 11px;
      width: 100%;
    }

    .control:hover {
      border-color: var(--border-strong);
    }

    .search {
      padding-left: 13px;
    }

    .results-meta {
      color: var(--text-muted);
      font-size: 12px;
      margin-bottom: 10px;
      min-height: 18px;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .memory-card,
    .agent-card,
    .import-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      box-shadow: var(--shadow);
      min-width: 0;
      padding: 16px 18px;
    }

    .memory-card.conflict {
      border-left: 4px solid var(--danger);
      padding-left: 15px;
    }

    .memory-card.targeted {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(40, 95, 135, 0.12);
    }

    .card-topline {
      align-items: flex-start;
      display: flex;
      gap: 12px;
      justify-content: space-between;
      min-width: 0;
    }

    .subject {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
      margin: 0;
      overflow-wrap: anywhere;
    }

    .badges {
      align-items: center;
      display: flex;
      flex: 0 0 auto;
      flex-wrap: wrap;
      gap: 5px;
      justify-content: flex-end;
    }

    .badge {
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-muted);
      display: inline-flex;
      font-size: 11px;
      font-weight: 650;
      line-height: 20px;
      min-height: 22px;
      padding: 0 8px;
      white-space: nowrap;
    }

    .badge.core,
    .badge.current {
      background: var(--accent-soft);
      border-color: #bdd9ca;
      color: var(--accent);
    }

    .badge.private,
    .badge.sensitive {
      background: var(--blue-soft);
      border-color: #c5d7e4;
      color: var(--blue);
    }

    .badge.conflict,
    .badge.tombstone {
      background: var(--danger-soft);
      border-color: #efc6c3;
      color: var(--danger);
    }

    .summary {
      color: #303830;
      line-height: 1.55;
      margin: 11px 0 13px;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 12px;
    }

    .tag {
      background: var(--surface-muted);
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 11px;
      padding: 3px 6px;
    }

    .metadata {
      align-items: center;
      border-top: 1px solid #eceeeb;
      color: var(--text-muted);
      display: flex;
      flex-wrap: wrap;
      font-size: 11px;
      gap: 6px 14px;
      padding-top: 11px;
    }

    .metadata strong {
      color: #465046;
      font-weight: 650;
    }

    .metadata a,
    .memory-link {
      color: var(--blue);
      text-decoration: none;
    }

    .metadata a:hover,
    .memory-link:hover {
      text-decoration: underline;
    }

    .memory-link {
      background: transparent;
      border: 0;
      font-size: 11px;
      padding: 0;
    }

    .conflict-heading {
      border-bottom: 1px solid var(--border-strong);
      color: var(--danger);
      font-size: 14px;
      font-weight: 720;
      margin: 16px 0 0;
      overflow-wrap: anywhere;
      padding: 0 2px 8px;
    }

    .conflict-heading:first-child {
      margin-top: 0;
    }

    .agent-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    }

    .agent-name,
    .import-title {
      font-size: 15px;
      font-weight: 700;
      margin: 0 0 5px;
      overflow-wrap: anywhere;
    }

    .agent-detail,
    .import-detail {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .import-counts {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 12px;
    }

    .import-count {
      color: var(--text-muted);
      font-size: 11px;
    }

    .import-count strong {
      color: var(--text);
      display: block;
      font-size: 16px;
      font-variant-numeric: tabular-nums;
      margin-bottom: 1px;
    }

    .empty-state {
      border: 1px dashed var(--border-strong);
      border-radius: 7px;
      color: var(--text-muted);
      padding: 42px 18px;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1080px) {
      .toolbar {
        grid-template-columns: minmax(220px, 1fr) repeat(3, minmax(110px, auto));
      }

      .toolbar select:nth-of-type(4),
      .toolbar select:nth-of-type(5) {
        grid-row: 2;
      }
    }

    @media (max-width: 760px) {
      .header-inner {
        padding: 10px 16px;
      }

      .brand {
        min-width: 0;
      }

      .layout {
        display: block;
      }

      .sidebar {
        background: var(--canvas);
        border-bottom: 1px solid var(--border);
        border-right: 0;
        overflow-x: auto;
        padding: 10px 12px;
        position: sticky;
        top: 65px;
        z-index: 9;
      }

      .nav {
        display: flex;
        gap: 5px;
        min-width: max-content;
        position: static;
      }

      .nav-button {
        gap: 10px;
        min-height: 36px;
        width: auto;
      }

      main {
        padding: 22px 16px 42px;
      }

      .toolbar {
        grid-template-columns: 1fr 1fr;
      }

      .search {
        grid-column: 1 / -1;
      }

      .toolbar select:nth-of-type(4),
      .toolbar select:nth-of-type(5) {
        grid-row: auto;
      }

      .card-topline {
        display: block;
      }

      .badges {
        justify-content: flex-start;
        margin-top: 8px;
      }
    }

    @media (max-width: 460px) {
      .brand-subtitle,
      .sync-state span {
        display: none;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .search {
        grid-column: auto;
      }

      .page-heading {
        align-items: flex-start;
        display: block;
      }

      .page-meta {
        margin-top: 5px;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">M</div>
        <div>
          <div class="brand-name">MegaBrain</div>
          <div class="brand-subtitle">Local Markdown memory</div>
        </div>
      </div>
      <div class="sync-state" id="sync-state" title="Synchronization status">
        <span class="sync-dot" aria-hidden="true"></span>
        <span id="sync-label">Local state</span>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" aria-label="Brain views">
      <nav class="nav" id="navigation">
        <button class="nav-button active" data-view="current"><span>Current</span><span class="nav-count" id="count-current">0</span></button>
        <button class="nav-button" data-view="history"><span>History</span><span class="nav-count" id="count-history">0</span></button>
        <button class="nav-button" data-view="conflicts"><span>Conflicts</span><span class="nav-count" id="count-conflicts">0</span></button>
        <button class="nav-button" data-view="agents"><span>Agents</span><span class="nav-count" id="count-agents">0</span></button>
        <button class="nav-button" data-view="imports"><span>Imports</span><span class="nav-count" id="count-imports">0</span></button>
      </nav>
    </aside>

    <main>
      <div class="page-heading">
        <h1 id="page-title">Current memories</h1>
        <div class="page-meta" id="generated-at"></div>
      </div>

      <p class="snapshot-note" id="snapshot-note"></p>

      <div class="toolbar" id="memory-toolbar">
        <input class="control search" id="search" type="search" placeholder="Search memories" autocomplete="off" aria-label="Search memories">
        <select class="control" id="filter-kind" aria-label="Filter by kind"><option value="">All kinds</option></select>
        <select class="control" id="filter-importance" aria-label="Filter by importance"><option value="">All importance</option></select>
        <select class="control" id="filter-confidence" aria-label="Filter by confidence"><option value="">All confidence</option></select>
        <select class="control" id="filter-sensitivity" aria-label="Filter by sensitivity"><option value="">All sensitivity</option></select>
        <select class="control" id="filter-agent" aria-label="Filter by agent"><option value="">All agents</option></select>
        <select class="control" id="filter-date" aria-label="Filter by month"><option value="">All dates</option></select>
      </div>

      <div class="results-meta" id="results-meta"></div>
      <section class="list" id="content" aria-live="polite"></section>
    </main>
  </div>

  <script>
    const DATA = __MEGABRAIN_DATA__;
    const state = { view: "current", query: "", kind: "", importance: "", confidence: "", sensitivity: "", agent: "", date: "" };
    const titles = {
      current: "Current memories",
      history: "Memory history",
      conflicts: "Conflicts",
      agents: "Registered agents",
      imports: "Import reports"
    };

    const content = document.getElementById("content");
    const toolbar = document.getElementById("memory-toolbar");
    const resultsMeta = document.getElementById("results-meta");
    const agentNames = Object.fromEntries(DATA.agents.map(agent => [agent.id, agent.display_name]));

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function shortId(value) {
      return String(value ?? "").slice(0, 8);
    }

    function formatDate(value) {
      if (!value) return "Unknown date";
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? value : date.toLocaleString([], { dateStyle: "medium", timeStyle: "short" });
    }

    function label(value) {
      return String(value ?? "").replaceAll("-", " ").replace(/\b\w/g, match => match.toUpperCase());
    }

    function memoryLink(memoryId, relation) {
      return `<button class="memory-link" data-memory-id="${escapeHtml(memoryId)}" title="Open memory ${escapeHtml(memoryId)}">${escapeHtml(relation)} ${escapeHtml(shortId(memoryId))}</button>`;
    }

    function memoryCard(memory) {
      const tags = memory.tags.length
        ? `<div class="tag-row">${memory.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>`
        : "";
      const relations = [
        ...memory.supersedes.map(id => memoryLink(id, "Replaces")),
        ...memory.superseded_by.map(id => memoryLink(id, "Replaced by"))
      ];
      const source = memory.source || {};
      const locator = source.locator ? `<span><strong>Source</strong> ${escapeHtml(source.locator)}</span>` : "";
      const badges = [
        `<span class="badge ${escapeHtml(memory.status)}">${escapeHtml(label(memory.status))}</span>`,
        `<span class="badge">${escapeHtml(label(memory.kind))}</span>`,
        memory.importance === "core" ? `<span class="badge core">Core</span>` : "",
        memory.sensitivity !== "general" ? `<span class="badge ${escapeHtml(memory.sensitivity)}">${escapeHtml(label(memory.sensitivity))}</span>` : "",
        memory.conflict ? `<span class="badge conflict">Conflict</span>` : ""
      ].filter(Boolean).join("");
      return `
        <article class="memory-card ${memory.conflict ? "conflict" : ""}" data-memory-card="${escapeHtml(memory.id)}">
          <div class="card-topline">
            <h2 class="subject">${escapeHtml(memory.subject)}</h2>
            <div class="badges">${badges}</div>
          </div>
          <div class="summary">${escapeHtml(memory.summary)}</div>
          ${tags}
          <div class="metadata">
            <span><strong>Created</strong> ${escapeHtml(formatDate(memory.created_at))}</span>
            <span><strong>Agent</strong> ${escapeHtml(agentNames[memory.created_by] || shortId(memory.created_by))}</span>
            <span><strong>Confidence</strong> ${escapeHtml(label(memory.confidence))}</span>
            ${locator}
            ${relations.join("")}
            <a href="../../${encodeURI(memory.path)}" title="Open the immutable Markdown source">Open Markdown</a>
          </div>
        </article>`;
    }

    function emptyState(message) {
      return `<div class="empty-state">${escapeHtml(message)}</div>`;
    }

    function memoryMatches(memory, statuses) {
      const query = state.query.trim().toLowerCase();
      if (!statuses.includes(memory.status)) return false;
      if (state.kind && memory.kind !== state.kind) return false;
      if (state.importance && memory.importance !== state.importance) return false;
      if (state.confidence && memory.confidence !== state.confidence) return false;
      if (state.sensitivity && memory.sensitivity !== state.sensitivity) return false;
      if (state.agent && memory.created_by !== state.agent) return false;
      if (state.date && !String(memory.created_at).startsWith(state.date)) return false;
      if (!query) return true;
      const haystack = [memory.subject, memory.summary, memory.kind, ...(memory.tags || [])].join(" ").toLowerCase();
      return haystack.includes(query);
    }

    function filteredMemories(statuses) {
      return DATA.memories.filter(memory => memoryMatches(memory, statuses));
    }

    function renderMemories(statuses, emptyMessage) {
      const memories = filteredMemories(statuses);
      resultsMeta.textContent = `${memories.length} ${memories.length === 1 ? "memory" : "memories"}`;
      content.className = "list";
      content.innerHTML = memories.length ? memories.map(memoryCard).join("") : emptyState(emptyMessage);
    }

    function renderConflicts() {
      const byId = Object.fromEntries(DATA.memories.map(memory => [memory.id, memory]));
      const groups = DATA.conflicts.filter(conflict => {
        const memories = conflict.memory_ids.map(id => byId[id]).filter(Boolean);
        return memories.some(memory => memoryMatches(memory, ["current"]));
      });
      resultsMeta.textContent = `${groups.length} ${groups.length === 1 ? "conflict" : "conflicts"}`;
      content.className = "list";
      content.innerHTML = groups.length
        ? groups.map(group => {
            const cards = group.memory_ids.map(id => byId[id]).filter(Boolean).map(memoryCard).join("");
            return `<h2 class="conflict-heading">${escapeHtml(group.subject)}</h2>${cards}`;
          }).join("")
        : emptyState("No unresolved conflicts");
    }

    function renderAgents() {
      resultsMeta.textContent = `${DATA.agents.length} ${DATA.agents.length === 1 ? "agent" : "agents"}`;
      content.className = "agent-grid";
      content.innerHTML = DATA.agents.length
        ? DATA.agents.map(agent => `
            <article class="agent-card">
              <h2 class="agent-name">${escapeHtml(agent.display_name)}</h2>
              <div class="agent-detail">${escapeHtml(label(agent.harness))} &middot; ${escapeHtml(shortId(agent.id))}</div>
              <div class="import-counts">
                <div class="import-count"><strong>${escapeHtml(agent.contributions)}</strong>Contributions</div>
                <div class="import-count"><strong>${escapeHtml(formatDate(agent.created_at).split(",")[0])}</strong>Registered</div>
              </div>
            </article>`).join("")
        : emptyState("No registered agents");
    }

    function renderImports() {
      resultsMeta.textContent = `${DATA.imports.length} ${DATA.imports.length === 1 ? "import" : "imports"}`;
      content.className = "list";
      content.innerHTML = DATA.imports.length
        ? DATA.imports.map(item => {
            const counts = item.counts || {};
            return `
              <article class="import-card">
                <h2 class="import-title">${escapeHtml(item.source.locator || shortId(item.id))}</h2>
                <div class="import-detail">${escapeHtml(label(item.source.type))} &middot; ${escapeHtml(formatDate(item.created_at))} &middot; ${escapeHtml(agentNames[item.created_by] || shortId(item.created_by))}</div>
                <div class="import-counts">
                  ${["scanned", "created", "duplicates", "conflicts", "rejected"].map(key => `<div class="import-count"><strong>${escapeHtml(counts[key] || 0)}</strong>${escapeHtml(label(key))}</div>`).join("")}
                </div>
                <div class="metadata"><a href="../../${encodeURI(item.path)}" title="Open the immutable Markdown import report">Open Markdown</a></div>
              </article>`;
          }).join("")
        : emptyState("No import reports");
    }

    function render() {
      document.getElementById("page-title").textContent = titles[state.view];
      document.querySelectorAll(".nav-button").forEach(button => button.classList.toggle("active", button.dataset.view === state.view));
      const isMemoryView = ["current", "history", "conflicts"].includes(state.view);
      toolbar.classList.toggle("hidden", !isMemoryView);
      resultsMeta.classList.remove("hidden");
      if (state.view === "current") renderMemories(["current"], "No current memories");
      if (state.view === "history") renderMemories(["historical", "tombstone"], "No memory history");
      if (state.view === "conflicts") renderConflicts();
      if (state.view === "agents") renderAgents();
      if (state.view === "imports") renderImports();
      bindMemoryLinks();
    }

    function bindMemoryLinks() {
      document.querySelectorAll("[data-memory-id]").forEach(button => button.addEventListener("click", () => {
        const id = button.dataset.memoryId;
        const memory = DATA.memories.find(item => item.id === id);
        if (!memory) return;
        state.view = memory.status === "current" ? "current" : "history";
        state.query = "";
        document.getElementById("search").value = "";
        render();
        requestAnimationFrame(() => {
          const card = document.querySelector(`[data-memory-card="${CSS.escape(id)}"]`);
          if (!card) return;
          card.classList.add("targeted");
          card.scrollIntoView({ behavior: "smooth", block: "center" });
          setTimeout(() => card.classList.remove("targeted"), 2200);
        });
      }));
    }

    function populateSelect(id, values, formatter = label) {
      const select = document.getElementById(id);
      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = formatter(value);
        select.append(option);
      });
    }

    document.getElementById("count-current").textContent = DATA.stats.current;
    document.getElementById("count-history").textContent = DATA.stats.history;
    document.getElementById("count-conflicts").textContent = DATA.stats.conflicts;
    document.getElementById("count-agents").textContent = DATA.stats.agents;
    document.getElementById("count-imports").textContent = DATA.stats.imports;
    const freshness = DATA.freshness || {};
    const generatedAt = formatDate(freshness.generated_at || DATA.generated_at);
    const newestMemoryAt = freshness.newest_memory_at
      ? formatDate(freshness.newest_memory_at)
      : "No memories yet";
    document.getElementById("generated-at").textContent = `Snapshot ${generatedAt} · Newest memory ${newestMemoryAt}`;
    document.getElementById("snapshot-note").textContent =
      "This is a private local snapshot, not a live page. Say “Synchronize and open my MegaBrain” to synchronize, validate, and regenerate it.";

    const syncState = document.getElementById("sync-state");
    if (freshness.stale || DATA.sync.stale) {
      syncState.classList.add("stale");
      document.getElementById("sync-label").textContent = "Snapshot may be stale";
      syncState.title = `Synchronization incomplete when generated: ${freshness.reason || DATA.sync.reason || "unknown reason"}`;
    } else {
      document.getElementById("sync-label").textContent = "Synchronized when generated";
      syncState.title = `Synchronized when generated at ${generatedAt}`;
    }

    populateSelect("filter-kind", [...new Set(DATA.memories.map(item => item.kind))].sort());
    populateSelect("filter-importance", [...new Set(DATA.memories.map(item => item.importance))].sort());
    populateSelect("filter-confidence", [...new Set(DATA.memories.map(item => item.confidence))].sort());
    populateSelect("filter-sensitivity", [...new Set(DATA.memories.map(item => item.sensitivity))].sort());
    populateSelect("filter-agent", DATA.agents.map(item => item.id), value => agentNames[value] || shortId(value));
    populateSelect("filter-date", [...new Set(DATA.memories.map(item => String(item.created_at).slice(0, 7)))].sort().reverse(), value => value);

    document.getElementById("navigation").addEventListener("click", event => {
      const button = event.target.closest("[data-view]");
      if (!button) return;
      state.view = button.dataset.view;
      render();
    });

    document.getElementById("search").addEventListener("input", event => {
      state.query = event.target.value;
      render();
    });

    for (const [id, key] of [
      ["filter-kind", "kind"],
      ["filter-importance", "importance"],
      ["filter-confidence", "confidence"],
      ["filter-sensitivity", "sensitivity"],
      ["filter-agent", "agent"],
      ["filter-date", "date"]
    ]) {
      document.getElementById(id).addEventListener("change", event => {
        state[key] = event.target.value;
        render();
      });
    }

    render();
  </script>
</body>
</html>
