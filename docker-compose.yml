services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: megabrain
      POSTGRES_USER: megabrain
      POSTGRES_PASSWORD: megabrain # secret-scan: allow-test-fixture
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U megabrain -d megabrain"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - megabrain-postgres:/var/lib/postgresql/data

volumes:
  megabrain-postgres:
